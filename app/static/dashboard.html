<!DOCTYPE html>
<html>
<head>
    <title>Labyrinth Engine — Dark Forest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #050505 0%, #000 95%);
            color: #f0f0f0;
            font-family: "Courier New", monospace;
            padding: 100px 40px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 1s ease;
        }

        body.fade-in { opacity: 1; }
        body.fade-out { opacity: 0; }

        /* Neon Frame */
        body::before {
            content: "";
            position: fixed;
            inset: 20px;
            border: 2px solid #00ffff;
            box-shadow:
                0 0 10px #00ffff,
                0 0 25px #ff00ff,
                inset 0 0 20px rgba(255,0,255,0.2);
            animation: borderPulse 4s infinite alternate;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes borderPulse {
            0% {
                box-shadow:
                    0 0 10px #00ffff,
                    0 0 20px #ff00ff;
            }
            100% {
                box-shadow:
                    0 0 25px #00ffff,
                    0 0 40px #ff00ff;
            }
        }

        /* VHS Scanlines */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255,255,255,0.03),
                rgba(255,255,255,0.03) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 5;
        }

        .panel {
            max-width: 700px;
            margin: auto;
            text-align: center;
        }

        h1 {
            font-weight: normal;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: #00ffff;
            text-shadow:
                0 0 5px #00ffff,
                0 0 20px #ff00ff;
            animation: neonFlicker 3s infinite alternate;
        }

        @keyframes neonFlicker {
            0% { opacity: 1; }
            48% { opacity: 0.95; }
            50% { opacity: 0.7; }
            52% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        p {
            margin-bottom: 40px;
            color: #aaa;
            letter-spacing: 2px;
        }

        select {
            width: 100%;
            height: 200px;
            background: #000;
            color: #fff;
            border: 2px solid #00ffff;
            padding: 15px;
            font-size: 16px;
            letter-spacing: 1px;
            box-shadow:
                0 0 10px rgba(0,255,255,0.4);
        }

        select:focus {
            outline: none;
            box-shadow:
                0 0 20px #00ffff,
                0 0 40px #ff00ff;
        }

        option {
            background: #000;
            color: #fff;
        }

        button {
            margin-top: 30px;
            padding: 15px 40px;
            background: black;
            border: 2px solid #ff00ff;
            color: #fff;
            font-size: 16px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow:
                0 0 10px rgba(255,0,255,0.4);
        }

        button:hover {
            box-shadow:
                0 0 20px #ff00ff,
                0 0 40px #00ffff;
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            body { padding: 60px 20px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>

<body>

<div class="panel">
    <h1>Enter the Forest</h1>
    <p>Select your path carefully.</p>

    <select id="themes" multiple>
        <option value="horror">Horror</option>
        <option value="psychological">Psychological</option>
        <option value="supernatural">Supernatural</option>
        <option value="thriller">Thriller</option>
        <option value="mystery">Mystery</option>
        <option value="coming-of-age">Coming of Age</option>
        <option value="history">History</option>
        <option value="science">Science</option>
    </select>

    <button onclick="navigateToExplore()">Summon</button>
</div>

<!-- Ambient Synth (Low Volume Placeholder) -->
<audio autoplay loop>
    <source src="https://cdn.jsdelivr.net/gh/anars/blank-audio/1-second-of-silence.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load", () => {
    document.body.classList.add("fade-in");
});

function navigateToExplore() {
    const select = document.getElementById("themes");
    const selected = [...select.selectedOptions].map(o => o.value);

    if (!selected.length) {
        alert("Choose your fate.");
        return;
    }

    const theme = selected[0];

    document.body.classList.remove("fade-in");
    document.body.classList.add("fade-out");

    setTimeout(() => {
        window.location.href = "/explore?theme=" + theme;
    }, 700);
}
</script>

</body>
</html>
