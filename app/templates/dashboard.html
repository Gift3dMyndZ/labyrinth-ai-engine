<!DOCTYPE html>
<html>
<head>
    <title>Labyrinth Engine — Dark Forest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #0a0f0a 0%, #000000 80%);
            color: #b8c6b8;
            font-family: "Georgia", serif;
            overflow: hidden;
            position: relative;
        }

        /* =============================
           FOG LAYER
        ============================== */

        .fog {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 60%, rgba(40,50,40,0.3), transparent 70%);
            animation: fogMove 20s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fogMove {
            from { transform: translateX(-20px); }
            to   { transform: translateX(20px); }
        }

        /* =============================
           TREES
        ============================== */

        .tree {
            position: fixed;
            bottom: 0;
            font-size: 180px;
            color: #0f1a0f;
            opacity: 0.8;
            transform-origin: bottom center;
            animation: sway 6s infinite ease-in-out alternate;
            pointer-events: none;
        }

        .tree:nth-child(1) { left: 5%; animation-duration: 7s; }
        .tree:nth-child(2) { left: 25%; animation-duration: 6s; }
        .tree:nth-child(3) { left: 50%; animation-duration: 8s; }
        .tree:nth-child(4) { left: 75%; animation-duration: 7s; }
        .tree:nth-child(5) { left: 90%; animation-duration: 6s; }

        @keyframes sway {
            from { transform: rotate(-2deg); }
            to   { transform: rotate(2deg); }
        }

        /* =============================
           FALLING LEAVES
        ============================== */

        .leaf {
            position: fixed;
            top: -20px;
            font-size: 20px;
            color: #3a4d3a;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0.2;
            }
        }

        /* =============================
           UI PANEL
        ============================== */

        .panel {
            position: relative;
            width: 90%;
            max-width: 1000px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(10,15,10,0.9);
            border: 1px solid #1f2a1f;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            z-index: 3;
        }

        h1 {
            font-weight: normal;
            margin-bottom: 20px;
            font-size: 42px;
            color: #e6f2e6;
            letter-spacing: 2px;
        }

        p {
            margin-bottom: 30px;
            font-style: italic;
            font-size: 20px;
            color: #9fb09f;
        }

        select {
            background: #0b140b;
            color: #cdd8cd;
            border: 1px solid #1f2a1f;
            padding: 12px;
            min-width: 320px;
            font-size: 18px;
            height: 180px;
        }

        select option {
            padding: 6px;
        }

        button {
            background: #141f14;
            color: #d8e0d8;
            border: 1px solid #2d3d2d;
            padding: 12px 20px;
            margin-left: 15px;
            cursor: pointer;
            font-size: 18px;
        }

        button:hover {
            background: #1c2a1c;
        }

        .cards {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(15,20,15,0.95);
            padding: 15px;
            border: 1px solid #1f2a1f;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            filter: grayscale(30%) brightness(0.8);
            margin-bottom: 10px;
        }

        .card h3 {
            font-size: 16px;
            color: #e6f2e6;
        }

        .card p {
            font-size: 14px;
            color: #9fb09f;
        }

        @media (max-width:600px) {
            h1 { font-size: 28px; }
            p { font-size: 16px; }
            select { width: 100%; min-width: unset; }
            button { width: 100%; margin: 15px 0 0 0; }
            .cards { grid-template-columns: 1fr; }
        }

    </style>
</head>

<body>

<div class="fog"></div>

<div class="tree">🌲</div>
<div class="tree">🌲</div>
<div class="tree">🌲</div>
<div class="tree">🌲</div>
<div class="tree">🌲</div>

<div class="panel">
    <h1>Enter the Dark Forest</h1>
    <p>Select your path... if you dare.</p>

    <select id="themes" multiple>
        <option value="horror">Horror</option>
        <option value="psychological">Psychological</option>
        <option value="supernatural">Supernatural</option>
        <option value="thriller">Thriller</option>
        <option value="mystery">Mystery</option>
        <option value="coming-of-age">Coming of Age</option>
        <option value="history">History</option>
        <option value="science">Science</option>
    </select>

    <button onclick="getRecommendations()">Summon</button>

    <div class="cards" id="results"></div>
</div>

<script>

/* Recommender unchanged */

async function getRecommendations() {
    const select = document.getElementById("themes");
    const selected = [...select.selectedOptions].map(o => o.value);

    if (!selected.length) {
        alert("Choose your fate...");
        return;
    }

    try {
        const response = await fetch("/recommend", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ preferences: selected })
        });

        const data = await response.json();
        const results = document.getElementById("results");
        results.innerHTML = "";

        data.forEach(book => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="${book.image}">
                <h3>${book.title}</h3>
                <p>${book.themes.join(", ")}</p>
            `;
            results.appendChild(card);
        });

    } catch {
        alert("The forest rejects your request.");
    }
}

/* Leaves */

function spawnLeaf() {
    const leaf = document.createElement("div");
    leaf.className = "leaf";
    leaf.innerHTML = "🍂";
    leaf.style.left = Math.random() * window.innerWidth + "px";
    leaf.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(leaf);
    setTimeout(() => leaf.remove(), 10000);
}

setInterval(spawnLeaf, 500);

</script>

</body>
</html>
