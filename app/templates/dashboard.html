<!DOCTYPE html>
<html>
<head>
    <title>Labyrinth Engine — Dark Forest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #0a0f0a 0%, #000000 80%);
            color: #b8c6b8;
            font-family: "Georgia", serif;
            overflow: hidden;
            position: relative;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        body.fade-in {
            opacity: 1;
        }

        body.fade-out {
            opacity: 0;
        }

        /* =============================
           FOG
        ============================== */

        .fog {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 60%, rgba(40,50,40,0.3), transparent 70%);
            animation: fogMove 20s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fogMove {
            from { transform: translateX(-20px); }
            to   { transform: translateX(20px); }
        }

        /* =============================
           TREES
        ============================== */

        .tree {
            position: fixed;
            bottom: 0;
            font-size: 180px;
            color: #0f1a0f;
            opacity: 0.8;
            transform-origin: bottom center;
            animation: sway 6s infinite ease-in-out alternate;
            pointer-events: none;
        }

        .tree:nth-of-type(1) { left: 5%; animation-duration: 7s; }
        .tree:nth-of-type(2) { left: 25%; animation-duration: 6s; }
        .tree:nth-of-type(3) { left: 50%; animation-duration: 8s; }
        .tree:nth-of-type(4) { left: 75%; animation-duration: 7s; }
        .tree:nth-of-type(5) { left: 90%; animation-duration: 6s; }

        @keyframes sway {
            from { transform: rotate(-2deg); }
            to   { transform: rotate(2deg); }
        }

        /* =============================
           UI PANEL
        ============================== */

        .panel {
            position: relative;
            width: 90%;
            max-width: 900px;
            margin: 80px auto;
            padding: 50px;
            background: rgba(10,15,10,0.95);
            border: 1px solid #1f2a1f;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            z-index: 3;
        }

        h1 {
            font-weight: normal;
            margin-bottom: 20px;
            font-size: 42px;
            color: #e6f2e6;
            letter-spacing: 2px;
        }

        p {
            margin-bottom: 30px;
            font-style: italic;
            font-size: 20px;
            color: #9fb09f;
        }

        select {
            background: #0b140b;
            color: #cdd8cd;
            border: 1px solid #1f2a1f;
            padding: 12px;
            min-width: 320px;
            font-size: 18px;
            height: 180px;
        }

        select option {
            padding: 6px;
        }

        button {
            background: #141f14;
            color: #d8e0d8;
            border: 1px solid #2d3d2d;
            padding: 12px 20px;
            margin-left: 15px;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #1c2a1c;
        }

        @media (max-width:600px) {
            h1 { font-size: 28px; }
            p { font-size: 16px; }
            select { width: 100%; min-width: unset; }
            button { width: 100%; margin: 15px 0 0 0; }
        }

    </style>
</head>

<body>

<div class="fog"></div>

<div class="tree">🌲</div>
<div class="tree">🌲</div>
<div class="tree">🌲</div>
<div class="tree">🌲</div>
<div class="tree">🌲</div>

<div class="panel">
    <h1>Enter the Dark Forest</h1>
    <p>Select your path... if you dare.</p>

    <select id="themes" multiple>
        <option value="horror">Horror</option>
        <option value="psychological">Psychological</option>
        <option value="supernatural">Supernatural</option>
        <option value="thriller">Thriller</option>
        <option value="mystery">Mystery</option>
        <option value="coming-of-age">Coming of Age</option>
        <option value="history">History</option>
        <option value="science">Science</option>
    </select>

    <button onclick="navigateToExplore()">Summon</button>
</div>

<script>
/* Fade In */
window.addEventListener("load", () => {
    document.body.classList.add("fade-in");
});

/* Navigation */
function navigateToExplore() {
    const select = document.getElementById("themes");
    const selected = [...select.selectedOptions].map(o => o.value);

    if (!selected.length) {
        alert("Choose your fate...");
        return;
    }

    const theme = selected[0];

    document.body.classList.remove("fade-in");
    document.body.classList.add("fade-out");

    setTimeout(() => {
        window.location.href = "/explore?theme=" + theme;
    }, 600);
}
</script>

</body>
</html>
