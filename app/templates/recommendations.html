<!DOCTYPE html>
<html>
<head>
    <title>Explore the Forest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #050505 0%, #000 95%);
            color: #f0f0f0;
            font-family: "Courier New", monospace;
            padding: 80px;
            overflow-x: hidden;
            animation: fadeIn 1.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Neon Border Frame */
        body::before {
            content: "";
            position: fixed;
            inset: 20px;
            border: 2px solid #00ffff;
            box-shadow:
                0 0 10px #00ffff,
                0 0 25px #ff00ff,
                inset 0 0 20px rgba(255,0,255,0.2);
            animation: borderPulse 4s infinite alternate;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes borderPulse {
            0% {
                box-shadow:
                    0 0 10px #00ffff,
                    0 0 20px #ff00ff;
            }
            100% {
                box-shadow:
                    0 0 25px #00ffff,
                    0 0 40px #ff00ff;
            }
        }

        h1 {
            text-align: center;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 70px;
            color: #00ffff;
            text-shadow:
                0 0 5px #00ffff,
                0 0 20px #ff00ff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 50px;
        }

        .card {
            position: relative;
            cursor: pointer;
            opacity: 0;
            transform: translateY(15px);
            animation: reveal 1s ease forwards;
        }

        .card:nth-child(odd) { animation-delay: 0.2s; }
        .card:nth-child(even) { animation-delay: 0.4s; }

        @keyframes reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card img {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-radius: 6px;
            filter: contrast(110%) brightness(0.8);
            transition: all 0.5s ease;
            box-shadow:
                0 0 15px rgba(0,255,255,0.3),
                0 0 30px rgba(255,0,255,0.2);
        }

        .card:hover img {
            transform: scale(1.06);
            box-shadow:
                0 0 25px #00ffff,
                0 0 50px #ff00ff;
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 25px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
        }

        .overlay h3 {
            margin: 0;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow:
                0 0 5px #00ffff;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .back {
            margin-top: 100px;
            display: block;
            text-align: center;
            color: #aaa;
            letter-spacing: 2px;
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }

        .back:hover {
            color: #ffffff;
            text-shadow:
                0 0 5px #00ffff,
                0 0 15px #ff00ff;
        }

        /* VHS scanline effect */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255,255,255,0.03),
                rgba(255,255,255,0.03) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 5;
        }

        @media (max-width: 600px) {
            body { padding: 40px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

<h1>{{ theme }}</h1>

<div class="grid">
    {% for book in recommendations %}
    <a href="/play/{{ book.book | replace(' ', '-') | lower }}">
        <div class="card">
            <img src="{{ book.image }}" alt="{{ book.title }}">
            <div class="overlay">
                <h3>{{ book.title }}</h3>
            </div>
        </div>
    </a>
    {% endfor %}
</div>

<a class="back" href="/dashboard">← RETURN TO THE FOREST</a>

<!-- Ambient Synth -->
<audio autoplay loop>
    <source src="https://cdn.jsdelivr.net/gh/anars/blank-audio/1-second-of-silence.mp3" type="audio/mpeg">
</audio>

</body>
</html>
