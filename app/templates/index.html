<!DOCTYPE html>
<html>
<head>
    <title>LABYRINTH.EXE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            color: #00ff66;
            font-family: "Courier New", monospace;
            text-align: center;
            overflow: hidden;
        }

        /* =========================
           BOOT SCREEN
        ========================== */

        #bootScreen {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 50;
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* =========================
           GAME UI
        ========================== */

        #gameContainer {
            display: none;
        }

        .title {
            margin-top: 15px;
            font-size: 1.8rem;
            letter-spacing: 4px;
            text-shadow:
                0 0 5px #00ff66,
                0 0 15px #00ff66;
        }

        .hud {
            margin-top: 8px;
            font-size: 0.85rem;
        }

        .crt-wrapper {
            position: relative;
            width: 420px;
            height: 420px;
            margin: 30px auto;
            border: 3px solid #00ff66;
            box-shadow:
                0 0 20px #00ff66,
                inset 0 0 20px #002200;
        }

        canvas {
            display: block;
            background: black;
        }

        .scanlines {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                rgba(0,255,0,0.05) 0px,
                rgba(0,255,0,0.05) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
        }

        /* =========================
           WINDOWS 98 TASKBAR
        ========================== */

        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: #c0c0c0;
            color: black;
            display: flex;
            align-items: center;
            font-size: 12px;
            padding: 0 10px;
            font-family: Tahoma, sans-serif;
        }

        .start-btn {
            background: linear-gradient(#fff, #aaa);
            border: 1px solid #000;
            padding: 2px 10px;
            margin-right: 10px;
        }
    </style>
</head>

<body>

<!-- =========================
     BOOT SCREEN
========================= -->

<div id="bootScreen">
    <h1>Microsoft Windows 98</h1>
    <p>LABYRINTH.EXE</p>
    <p class="blink">Press ENTER to run</p>
</div>

<!-- =========================
     GAME CONTAINER
========================= -->

<div id="gameContainer">

    <h1 class="title">LABYRINTH</h1>

    <div class="hud">
        Level: <span id="level">1</span> |
        Time: <span id="time">0</span>s |
        Score: <span id="score">0</span>
    </div>

    <div class="crt-wrapper">
        <canvas id="game" width="420" height="420"></canvas>
        <div class="scanlines"></div>
    </div>

    <div class="status-bar">
        <div class="start-btn">Start</div>
        LABYRINTH.EXE Running...
    </div>

</div>

<!-- ✅ GAME SCRIPT -->
<script src="/static/game.js"></script>

<script>

/* =========================
   ENTER TO START
========================= */

document.addEventListener("keydown", function(e) {

    if (e.key === "Enter") {

        const boot = document.getElementById("bootScreen");
        const gameUI = document.getElementById("gameContainer");

        boot.style.display = "none";
        gameUI.style.display = "block";

        if (window.startGame) {
            window.startGame();
        }
    }
});

</script>

</body>
</html>
