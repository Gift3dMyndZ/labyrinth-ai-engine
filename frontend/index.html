<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LABYRINTH</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- ✅ LOAD STYLESHEET -->
    /static/style.css
</head>

<body>

<!-- =========================
     BOOT SCREEN
========================= -->

<div id="bootScreen" class="screen">
    <!-- ✅ Tartarus glow added, legacy glow preserved -->
    <h2 class="glow glow-tartarus">LABYRINTH</h2>
    <p class="blink">Press ENTER to begin</p>
</div>

<!-- =========================
     GAME CONTAINER
========================= -->

<div id="gameContainer" style="display:none;">

    <!-- ✅ Title upgraded to Tartarus theme -->
    <h1 class="title glow glow-tartarus">LABYRINTH</h1>

    <div class="crt-wrapper">
        <canvas id="game"></canvas>
        <div class="scanlines"></div>
    </div>

    <!-- OPTIONAL: CONTROLS (if enabled in CSS/JS) -->
    <div class="controls">
        <label>
            BRIGHTNESS
            <input
                type="range"
                min="0.6"
                max="1.6"
                step="0.01"
                value="1"
                id="brightnessSlider"
            >
        </label>

        <label>
            GAMMA
            <input
                type="range"
                min="0.6"
                max="1.6"
                step="0.01"
                value="1"
                id="gammaSlider"
            >
        </label>
    </div>

</div>

<!-- ✅ LOAD GAME SCRIPT -->
/static/game.js</script>

</body>
</html>
