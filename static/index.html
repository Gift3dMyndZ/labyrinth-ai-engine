<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LABYRINTH OF TARTARUS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BOOT SCREEN -->
<div id="bootScreen" class="screen">
    <h2 class="glow">ΤΑΡΤΑΡΟΣ</h2>
    <p class="subtitle">LABYRINTH OF TARTARUS</p>
    <p class="blink">Press ENTER to descend</p>
</div>

<!-- GAME CONTAINER -->
<div id="gameContainer">
    <h1 class="title glow">LABYRINTH OF TARTARUS</h1>
    <div class="crt-wrapper">
        <canvas id="game"></canvas>
        <canvas id="sky-canvas"></canvas>
        <div class="scanlines"></div>
    </div>
    <div class="controls">
        <label>BRIGHTNESS
            <input type="range" min="0.6" max="1.6" step="0.01" value="1" id="brightnessSlider">
        </label>
        <label>GAMMA
            <input type="range" min="0.6" max="1.6" step="0.01" value="1" id="gammaSlider">
        </label>
        <label>COLOR TINT
            <input type="range" min="0" max="360" step="1" value="0" id="hueSlider">
        </label>
    </div>
</div>

<!-- TOUCH OVERLAY -->
<div id="touch-overlay">
    <div id="move-stick" class="joystick">
        <div class="stick"></div>
    </div>
    <div id="look-stick" class="joystick">
        <div class="stick"></div>
    </div>
    <button id="attack-btn" class="action-btn">⚔️</button>
    <button id="interact-btn" class="action-btn">🔍</button>
</div>

<script src="game.js"></script>
<script src="websocket/connection.js"></script>
<script src="websocket/audio-manager.js"></script>
<script src="websocket/audio-loader.js"></script>
<script src="websocket/mobile-tester.js"></script>
<script src="websocket/oracle-client.js"></script>
</body>
</html>
